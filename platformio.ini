; ESP32 + BME680 (Adafruit) + BMV080 (SparkFun) + WiFi WebSocket (BT disabled in sdkconfig.defaults)
; Build:  source .venv/bin/activate && pio run
; Upload: pio run -t upload
;
; BMV080: Bosch prebuilt libs are NOT shipped with the SparkFun library.
; After lib install, run: ./scripts/install_bmv080_sdk.sh /path/to/bmv080_sdk

[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
board_build.sdkconfig_defaults = sdkconfig.defaults
; `+<*>` pulls in `battery_test/.pio/libdeps` as C++ sources — exclude the whole `battery_test` tree.
build_src_filter = +<*> -<battery_test/**>

extra_scripts = pre:scripts/check_bmv080_sdk.py

lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.14.5
    adafruit/Adafruit BME680 Library@^2.0.4
    sparkfun/SparkFun BMV080 Arduino Library@^1.0.4
    links2004/WebSockets@^2.4.1
