; Optional battery + sensors test sketch (separate from root bmv.ino).
; Build:  cd battery_test && pio run
; Upload: pio run -t upload
; Remove this folder when no longer needed.

[platformio]
src_dir = .

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
extra_scripts = pre:../scripts/check_bmv080_sdk.py

lib_deps =
    adafruit/Adafruit Unified Sensor@^1.1.14
    adafruit/Adafruit BusIO@^1.14.5
    adafruit/Adafruit BME680 Library@^2.0.4
    sparkfun/SparkFun BMV080 Arduino Library@^1.0.4
